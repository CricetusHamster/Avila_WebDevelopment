<html>
<head>
    <title>Activity 5</title>
</head>
<body>
    <h1>Contact</h1>
    <p>Email: emman.avila@example.com</p>
    <p>Phone: +63 420 777 2167</p>
    <h2>Send me a message:</h2>
    <form action="">
        <label for="fullName">Full Name:<br></label>
            <input type="text" id="fullName">
            <br><br>
        <label for="email">Email:<br></label>
            <input type="text" id="email">
            <br><br>
        <label for="password">Password:<br></label>
            <input type="password" id="password">
            <br><br>
        <label for="contactMethod">Preferred Contact Method:<br></label>
            <input type="radio" id="emailContactMethod" name="contactMethod" value="EMAIL">
                <label for="EMAIL">Email</label>
            <input type="radio" id="phoneContactMethod" name="contactMethod" value="PHONE">
                <label for="PHONE">Phone</label>
                <br><br>
        <label for="services">Services Interested In:</label><br>
            <input type="checkbox" id="webDesign" name="services1" value="WEBDESIGN"">
                <label for="WEBDESIGN">Web Design</label>
            <input type="checkbox" id="programming" name="services2" value="PROGRAMMING">
                <label for="PROGRAMMING">Programming</label>
            <input type="checkbox" id="tutoring" name="services3" value="TUTORING">
                <label for="TUTORING">Tutoring</label>
                <br><br>
        <label for="message">Your Message:<br></label>
        <textarea id="message" cols="34" rows="5"></textarea><br><br>
        <input type="button" value="Submit">
        <input type="reset">
    </form>
</body>
</html>
